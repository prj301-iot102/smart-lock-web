<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/users.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <h2>User Management</h2>
            <div class="feature-container">
            <div class="search-container">
                <button class="userbtn" onclick="getUserByID()"><i class="bi bi-search"></i></button>
                <input type="text" id="userIdInput" placeholder="Enter user ID">
            </div>
                <button class="createbtn" onclick="showCreateForm()">+</button>
            </div>
            <div class="feature-ui">
            <div class="user-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created At</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
                <p id="userMessage"></p>
                <div class="update-password">
                <div>
                    <input type="password" id="newPassword" placeholder="New Password">
                </div>
                <button onclick="updatePassword()">Update</button>
            </div>
            </div>
            <div class="create-user">
                <div id="createUserForm" class="hidden-form">
                    <div class="form-group">
                        <label for="fullName"><p>Full Name</p></label>
                        <input type="text" id="fullName">
                    </div>
                    <div class="form-group">
                        <label for="department"><p>Department</p></label>
                        <input type="text" id="department">
                    </div>
                    <div class="form-group">
                        <label for="username"><p>Username</p></label>
                        <input type="text" id="username">
                    </div>
                    <div class="form-group">
                        <label for="password"><p>Password</p></label>
                        <input type="password" id="password">
                    </div>
                    <div class="user-btn">
                        <button onclick="hideCreateForm()">Cancel</button>
                        <button onclick="createUser()">Create</button>
                    </div>
                </div>
                
            </div>
        </div>
            
        </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/users.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
