<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/employees.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <h2>Employees</h2>
            <div class="search-container">
                <label for="searchType">Search by</label>
                <select id="searchType">
                    <option value="id">ID</option>
                    <option value="name">Name</option>
                </select>
                <input type="text" id="searchInput">
                <button onclick="searchEmployee()">Search</button>
            </div>
            <div class="filter-container">
                <label>Filter by</label>
                <select id="filterType" onchange="changeFilterInput()">
                    <option value="">None</option>
                    <option value="birth">Birth</option>
                    <option value="created">Created Date</option>
                    <option value="updated">Updated Date</option>
                    <option value="department">Department</option>
                </select>
                <input type="date" id="fromDate">
                <input type="date" id="toDate">
                <input id="departmentInput">
                <button onclick="handleFilter()">Filter</button>
            </div>
            <div>
                Show
                <select id="selectedLimit" onchange="changeLimit()">
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10" selected>10</option>
                </select>
                employees per page
            </div>
            <div class="employees-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Full Name</th>
                            <th>Birth</th>
                            <th>Department</th>
                            <th>Role</th>
                            <th>Created At</th>
                            <th>Updated At</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody"></tbody>
                </table>
                <p id="employeeMessage"></p>
            </div>
            <div class="pagination">
                <button onclick="prevPage()">Prev</button>
                <span id="pageInfo"></span>
                <button onclick="nextPage()">Next</button>
            </div>
            <div id="updateModal"> 
                <h3>Update Employee</h3>
                <div id="updateForm">
                    <div class="form-group">
                        <label for="newId">ID</label>
                        <input type="text" id="newId">
                    </div>
                    <div class="form-group">
                        <label for="newFullName">Full Name</label>
                        <input type="text" id="newFullName">
                    </div>
                    <div class="form-group">
                        <label for="newBirth">Birth</label>
                        <input type="date" id="newBirth">
                    </div>
                    <div class="form-group">
                        <label for="newDepartment">Department</label>
                        <input type="text" id="newDepartment">
                    </div>
                    <div class="form-group">
                        <label for="newRoleId">Role ID</label>
                        <input type="text" id="newRoleId">
                    </div>
                </div>
                <p id="updateError"></p>
                <button onclick="closeUpdateModal()">Cancel</button>
                <button onclick="updateEmployee()">Update</button>
            </div>
            <div class="create-employee">
                <button onclick="showCreateForm()">+ Create Employee</button>
                <div id="createEmployeeForm" class="hidden-form">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName">
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department">
                    </div>
                    <button onclick="hideCreateForm()">Cancel</button>
                    <button onclick="createEmployee()">Create</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/logout.js"></script>
</body>
</html>
