<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Door Management</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/doors.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <div class="header">
            <h2 class="header-title">Doors Management</h2>

        <div class="doors-layout">
            <div class="doors-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Door Name</th>
                            <th>Device ID</th>
                            <th>Created At</th>
                            <th>Updated At</th>
                            <th>Roles</th>
                        </tr>
                    </thead>
                    <tbody id="doorsTableBody"></tbody>
                </table>
                <p id="doorsMsg"></p>
                <p id="rolesMsg"></p>
            </div> 
        </div>
    </div>    
    </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/loadSidebar.js"></script>
    <script src="js/doors.js"></script>
    <script src="js/logout.js"></script>

</html>
