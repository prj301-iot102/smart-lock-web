<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/nfc.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
                <h2 class="header-title">NFC Tag Management</h2>
            <div class="nfcs-layout">
                <div class="nfcs-table">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>UID</th>
                                <th>EmployeeID</th>
                                <th>Full Name</th>
                                <th>Role Name</th>
                                <th>Active</th>
                                <th>Created At</th>
                                <th>Updated At</th>
                                <th span="2"></th>
                            </tr>
                        </thead>
                        <tbody id="nfcTableBody"></tbody>
                    </table>
                    <p id="error-msg"></p>
                </div>
            </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/nfc.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/auth.js"></script>it
