<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <h2>NFC Tag Management</h2>
            <div class="search-container">
                <input type="text" id="nfcID" placeholder="Enter NFC ID">
                <button onclick="getNfcByID()">Search</button>
            </div>
            <div class="nfc-info">
                <h3>NFC Information</h3>
                <div class="nfc-info-card">
                    <p>
                        <strong>ID</strong>
                        <span id="nfcID"></span>
                    </p>
                    <p>
                        <strong>UID</strong>
                        <span id="nfcUID"></span>
                    </p>
                    <p>
                        <strong>Employee ID</strong>
                        <span id="employeeID"></span>
                    </p>
                    <p>
                        <strong>Full Name</strong>
                        <span id="fullName"></span>
                    </p>
                    <p>
                        <strong>Username</strong>
                        <span id="username"></span>
                    </p>
                    <p>
                        <strong>Status</strong>
                        <span id="status"></span>
                    </p>
                    <p>
                        <strong>Created At</strong>
                        <span id="createdAt"></span>
                    </p>
                    <p>
                        <strong>Updated At</strong>
                        <span id="updatedAt"></span>
                    </p>
                </div>
                <button onclick="revokeNFC()">Revoke</button>
            </div>
            <div class="create-nfc">
                <button onclick="toggleCreateForm()">+ Create NFC</button>
                <div id="createNfcForm" style="display: none">
                    <h3>Create New NFC</h3>
                    <div class="form-group">
                        <label for="newUID">UID</label>
                        <input type="text" id="newUID">
                    </div>
                    <div class="form-group">
                        <label for="newMacAddress">MAC Address</label>
                        <input type="text" id="newMacAddress">
                    </div>
                    <button onclick="createNFC()">Create</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/nfc.js"></script>
    <script src="js/logout.js"></script>
</body>
</html>
