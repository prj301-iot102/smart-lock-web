<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <h2>NFC Tag Management</h2>
            <div class="search-container">
                <input type="text" id="nfcID" placeholder="Enter NFC ID">
                <button onclick="getNFC()">Search</button>
            </div>
            <table id="nfcTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>UID</th>
                        <th>Employee ID</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="nfcTableBody">

                </tbody>
            </table>
            <p id="error-msg"></p>
        </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/nfc.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
