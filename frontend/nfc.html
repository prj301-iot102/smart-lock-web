<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/nfc.css">
</head>
<body>
    <div class="layout">
        <div id="sidebar"></div>
        <div class="main">
            <div class="header">
                <h2 class="header-title">NFC Tag Management</h2>
                <div class="search-container">
                    <button class="searchbtn"><i class="bi bi-search"></i></button>
                    <input type="text" id="nfcID" placeholder="Enter NFC ID">
                </div>
            </div>
            <div class="nfc-info">
                <div class = "nfc-info-status">
                    <h3>NFC Information</h3>
                    <h3 id = "nfc-status"></h3>
                </div>
                <div class="nfc-info-card">
                    <p>
                        <strong>ID :</strong>
                        <span id="nfcID"></span>
                    </p>
                    <p>
                        <strong>UID :</strong>
                        <span id="nfcUID"></span>
                    </p>
                    <p>
                        <strong>Employee ID :</strong>
                        <span id="employeeID"></span>
                    </p>
                    <p>
                        <strong>Full Name :</strong>
                        <span id="fullName"></span>
                    </p>
                    <p>
                        <strong>Active :</strong>
                        <span id="status"></span>
                    </p>
                    <p>
                        <strong>Created At :</strong>
                        <span id="createdAt"></span>
                    </p>
                    <p>
                        <strong>Updated At :</strong>
                        <span id="updatedAt"></span>
                    </p>
                    <button class="revoke" onclick="revokeNFC();">
                        <i class="bi bi-trash3"></i>
                        Revoke
                    </button>
                </div>
        </div>
    </div>
    <script src="js/loadSidebar.js"></script>
    <script src="js/nfc.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
